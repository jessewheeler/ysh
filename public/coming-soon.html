<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellowstone Sea Hawkers — Coming Soon</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #002a5c;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .splash {
            max-width: 500px;
        }

        .splash img {
            max-width: 200px;
            margin-bottom: 2rem;
        }

        .splash h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #69be28;
        }

        .splash p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.85;
        }

        .splash .subtext {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
<div class="splash">
    <img src="/img/logo.png" alt="Yellowstone Sea Hawkers">
    <h1>Coming Soon</h1>
    <p>We're making some improvements. We'll be back shortly.</p>
    <p class="subtext">Go Hawks!</p>
</div>
</body>
</html>
